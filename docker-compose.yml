version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: price_comparison
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/price_comparison
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: 
      OPENAI_BASE_URL: https://api.chatanywhere.tech/v1
    volumes:
      - ./backend:/app
      - model_cache:/app/models
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  model_cache:
